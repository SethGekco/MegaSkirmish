; ===========================================================================
;  megaskirmish.ini  —  config for the MegaSkirmish companion DLL
;
;  Drop this next to gamemd.exe. The CnCNet client never reads or overwrites
;  it. Set up a NORMAL skirmish in the CnCNet client (you, plus however many
;  AI the client lets you add, up to its 8-slot limit); the houses below are
;  added ON TOP when the game launches.
;
;  TRIAL GOAL (milestone 1): one extra AI house appears with an MCV. Start
;  with a single [House0] section below; once that works, add more.
; ===========================================================================

[MegaSkirmish]
; ObserverMode=yes makes ALL configured houses AI and drops you to spectator
; (the "watch 25 AI fight" mode). Leave 'no' for normal play.
ObserverMode=no
DefaultCredits=10000

; --- First extra AI house -------------------------------------------------
; Country: index into the game's country list. In UNMODDED YR:
;   0=America 1=Korea 2=France 3=Germany 4=Britain
;   5=Libya 6=Iraq 7=Cuba (Russia) 8=Yuri
; In a MOD, these indices follow that mod's [Countries] list order instead.
[House0]
Country=8
Color=5
Difficulty=1
SpawnWaypoint=-1
CreditsFactor=1.0

